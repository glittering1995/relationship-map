<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>人物关系网</title>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js">
    </script>
    <style>
        :root {
            --bg: #f5f0eb;
            --surface: #ffffff;
            --text: #2c2416;
            --text-secondary: #6b5e4a;
            --accent: #c77d4b;
            --accent2: #5b8c85;
            --danger: #c0392b;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            position: fixed;
            top: 0;
            left: 0;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部栏 */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid #e8e0d5;
            z-index: 10;
            flex-shrink: 0;
            gap: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        #topbar .title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        #topbar .badge {
            font-size: 11px;
            background: #f0e8db;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 9px 14px;
            border-radius: 22px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.2px;
            transition: all 0.15s ease;
            min-height: 40px;
            touch-action: manipulation;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:active {
            background: #b06838;
            transform: scale(0.96);
        }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1.5px solid #d4b896;
        }
        .btn-outline:active {
            background: #fdf5ec;
            transform: scale(0.96);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 16px;
            min-height: 32px;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
            font-size: 20px;
            background: var(--surface);
            border: 1.5px solid #e0d5c5;
            color: var(--text-secondary);
            box-shadow: var(--shadow);
        }
        .btn-icon:active {
            background: #f5ede2;
            transform: scale(0.93);
        }
        .btn-icon.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* 画布容器 */
        #canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #faf7f2;
            background-image:
                radial-gradient(circle, #e8dcc8 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        #canvas-container.panning {
            cursor: grabbing;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
        }

        /* 底部工具栏 */
        #bottombar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 12px calc(10px + var(--safe-bottom));
            background: var(--surface);
            border-top: 1px solid #e8e0d5;
            z-index: 10;
            flex-shrink: 0;
            flex-wrap: wrap;
            box-shadow: 0 -1px 4px rgba(0, 0, 0, 0.04);
        }
        #bottombar .hint-text {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            width: 100%;
            flex-basis: 100%;
            margin-top: -4px;
            letter-spacing: 0.2px;
        }

        /* 底部弹出面板 */
        #edit-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            z-index: 100;
            padding: 20px 16px calc(20px + var(--safe-bottom));
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.15);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 60vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #edit-panel.open {
            transform: translateY(0);
        }
        #edit-panel .panel-handle {
            width: 36px;
            height: 5px;
            background: #d0c5b5;
            border-radius: 3px;
            align-self: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        #edit-panel label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        #edit-panel input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0d5c5;
            border-radius: 12px;
            font-size: 16px;
            background: #fdfaf5;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            -webkit-user-select: text;
            user-select: text;
        }
        #edit-panel input:focus {
            border-color: var(--accent);
            background: #fff;
        }
        #edit-panel .panel-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        #edit-panel .panel-actions .btn {
            flex: 1;
            min-width: 60px;
            justify-content: center;
        }
        #edit-panel .btn-danger {
            background: #fff0f0;
            color: var(--danger);
            border: 1.5px solid #f5d0d0;
        }
        #edit-panel .btn-danger:active {
            background: #ffe0e0;
        }

        /* 遮罩 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* Toast */
        #toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #3d3226;
            color: #fff;
            padding: 10px 20px;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            letter-spacing: 0.3px;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式 */
        @media (max-width: 380px) {
            #topbar {
                padding: 8px 10px;
            }
            #topbar .title {
                font-size: 15px;
            }
            .btn {
                padding: 7px 10px;
                font-size: 12px;
                border-radius: 18px;
                min-height: 34px;
            }
            .btn-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            #bottombar {
                gap: 6px;
                padding: 8px 8px calc(8px + var(--safe-bottom));
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 顶部栏 -->
        <div id="topbar">
            <span class="title">🕸️ 人物关系网</span>
            <span class="badge" id="node-count-badge">0人 / 0关系</span>
            <button class="btn btn-primary" id="btn-share" title="生成分享链接">📤 分享</button>
        </div>

        <!-- 画布 -->
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>

        <!-- 底部工具栏 -->
        <div id="bottombar">
            <button class="btn-icon" id="btn-add-node" title="添加人物">＋</button>
            <button class="btn-icon" id="btn-connect-mode" title="连线模式">🔗</button>
            <button class="btn-icon" id="btn-undo" title="撤销">↩</button>
            <button class="btn-icon" id="btn-fit" title="适应屏幕">⊡</button>
            <button class="btn-outline btn-sm" id="btn-clear" title="清空画布">清空</button>
            <span class="hint-text">💡 拖拽节点移动 · 选中后点另一节点连线 · 双击编辑</span>
        </div>

        <!-- 编辑面板 -->
        <div id="edit-panel">
            <div class="panel-handle"></div>
            <label id="panel-label">编辑名称</label>
            <input type="text" id="panel-input" placeholder="输入名称…" autocomplete="off">
            <div class="panel-actions" id="panel-actions">
                <button class="btn btn-primary" id="panel-confirm">✓ 确认</button>
                <button class="btn btn-outline" id="panel-cancel">取消</button>
                <button class="btn btn-danger btn-sm" id="panel-delete">🗑 删除</button>
            </div>
        </div>

        <!-- 遮罩 -->
        <div id="overlay"></div>

        <!-- Toast -->
        <div id="toast"></div>
    </div>

    <script>
        (function() {
            // ============ DOM元素 ============
            const canvasContainer = document.getElementById('canvas-container');
            const canvas = document.getElementById('main-canvas');
            const ctx = canvas.getContext('2d');
            const editPanel = document.getElementById('edit-panel');
            const overlay = document.getElementById('overlay');
            const panelLabel = document.getElementById('panel-label');
            const panelInput = document.getElementById('panel-input');
            const panelConfirm = document.getElementById('panel-confirm');
            const panelCancel = document.getElementById('panel-cancel');
            const panelDelete = document.getElementById('panel-delete');
            const panelActions = document.getElementById('panel-actions');
            const nodeCountBadge = document.getElementById('node-count-badge');
            const toast = document.getElementById('toast');
            const btnShare = document.getElementById('btn-share');
            const btnAddNode = document.getElementById('btn-add-node');
            const btnConnectMode = document.getElementById('btn-connect-mode');
            const btnUndo = document.getElementById('btn-undo');
            const btnFit = document.getElementById('btn-fit');
            const btnClear = document.getElementById('btn-clear');

            // ============ 数据模型 ============
            let nodes = []; // { id, name, x, y, color }
            let edges = []; // { id, source, target, label }
            let nodeIdCounter = 0;
            let edgeIdCounter = 0;
            let selectedNodeId = null;
            let connectMode = false;
            let historyStack = [];
            const MAX_HISTORY = 60;

            // 节点颜色池
            const nodeColorPool = [
                '#e8a87c', '#d4a574', '#c4956a', '#e0b890', '#d9a87c',
                '#7ec8c8', '#6db8b0', '#8cc7c0', '#a0d2cb', '#5b9e98',
                '#f0c8a0', '#e8b88a', '#dcaa7a', '#f2d0b0', '#e5c49a',
                '#c9a87c', '#b8956e', '#d4b896', '#e0c8a8', '#c8b090'
            ];

            function getNodeColor(index) {
                return nodeColorPool[index % nodeColorPool.length];
            }

            function generateNodeId() { return 'n' + (++nodeIdCounter); }

            function generateEdgeId() { return 'e' + (++edgeIdCounter); }

            function getNodeById(id) { return nodes.find(n => n.id === id); }

            function getEdgeById(id) { return edges.find(e => e.id === id); }

            function getConnectionCount(nodeId) {
                return edges.filter(e => e.source === nodeId || e.target === nodeId).length;
            }

            function getNodeRadius(nodeId) {
                const count = getConnectionCount(nodeId);
                const base = 26;
                const growth = 5;
                const maxR = 58;
                const minR = 22;
                return Math.max(minR, Math.min(maxR, base + count * growth));
            }

            // ============ 历史记录 ============
            function saveHistory() {
                const snapshot = {
                    nodes: JSON.parse(JSON.stringify(nodes)),
                    edges: JSON.parse(JSON.stringify(edges)),
                    nodeIdCounter,
                    edgeIdCounter,
                };
                historyStack.push(snapshot);
                if (historyStack.length > MAX_HISTORY) historyStack.shift();
            }

            function undo() {
                if (historyStack.length === 0) {
                    showToast('没有可撤销的操作');
                    return false;
                }
                const snapshot = historyStack.pop();
                nodes = snapshot.nodes;
                edges = snapshot.edges;
                nodeIdCounter = snapshot.nodeIdCounter;
                edgeIdCounter = snapshot.edgeIdCounter;
                selectedNodeId = null;
                connectMode = false;
                updateConnectModeButton();
                updateBadge();
                render();
                updateUrlHash();
                saveToLocalStorage();
                showToast('已撤销 ↩');
                return true;
            }

            // ============ 视图状态 ============
            let panX = 0;
            let panY = 0;
            let zoom = 1;
            const MIN_ZOOM = 0.25;
            const MAX_ZOOM = 3.5;

            function worldToScreen(wx, wy) {
                return { x: wx * zoom + panX, y: wy * zoom + panY };
            }

            function screenToWorld(sx, sy) {
                return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
            }

            function fitAllNodes(animate = false) {
                if (nodes.length === 0) {
                    panX = canvas.width / 2;
                    panY = canvas.height / 2;
                    zoom = 1;
                    render();
                    return;
                }
                let minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                nodes.forEach(n => {
                    const r = getNodeRadius(n.id);
                    minX = Math.min(minX, n.x - r);
                    minY = Math.min(minY, n.y - r);
                    maxX = Math.max(maxX, n.x + r);
                    maxY = Math.max(maxY, n.y + r);
                });
                const dataW = maxX - minX + 60;
                const dataH = maxY - minY + 60;
                const scaleX = canvas.width / dataW;
                const scaleY = canvas.height / dataH;
                const newZoom = Math.min(scaleX, scaleY, 2.5);
                const dataCx = (minX + maxX) / 2;
                const dataCy = (minY + maxY) / 2;
                const targetPanX = canvas.width / 2 - dataCx * newZoom;
                const targetPanY = canvas.height / 2 - dataCy * newZoom;

                if (animate) {
                    const startPanX = panX,
                        startPanY = panY,
                        startZoom = zoom;
                    const startTime = performance.now();
                    const duration = 350;

                    function animStep(ts) {
                        const elapsed = ts - startTime;
                        const t = Math.min(1, elapsed / duration);
                        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                        panX = startPanX + (targetPanX - startPanX) * ease;
                        panY = startPanY + (targetPanY - startPanY) * ease;
                        zoom = startZoom + (newZoom - startZoom) * ease;
                        render();
                        if (t < 1) {
                            requestAnimationFrame(animStep);
                        }
                    }
                    requestAnimationFrame(animStep);
                } else {
                    panX = targetPanX;
                    panY = targetPanY;
                    zoom = newZoom;
                    render();
                }
            }

            // ============ Canvas渲染 ============
            function resizeCanvas() {
                const rect = canvasContainer.getBoundingClientRect();
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const w = rect.width;
                const h = rect.height;
                if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
                    canvas.width = w * dpr;
                    canvas.height = h * dpr;
                    canvas.style.width = w + 'px';
                    canvas.style.height = h + 'px';
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    ctx.scale(dpr, dpr);
                }
                return { w, h };
            }

            function render() {
                const { w, h } = resizeCanvas();
                ctx.clearRect(0, 0, w, h);

                // 网格背景
                ctx.fillStyle = '#faf7f2';
                ctx.fillRect(0, 0, w, h);
                const gridSize = 20 * zoom;
                const offsetX = panX % gridSize;
                const offsetY = panY % gridSize;
                ctx.fillStyle = 'rgba(200,185,160,0.25)';
                for (let x = offsetX; x < w; x += gridSize) {
                    for (let y = offsetY; y < h; y += gridSize) {
                        ctx.beginPath();
                        ctx.arc(x, y, Math.max(0.4, zoom * 0.5), 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                ctx.save();
                ctx.translate(panX, panY);
                ctx.scale(zoom, zoom);

                // 绘制连线
                edges.forEach(edge => {
                    const sourceNode = getNodeById(edge.source);
                    const targetNode = getNodeById(edge.target);
                    if (!sourceNode || !targetNode) return;

                    const sx = sourceNode.x;
                    const sy = sourceNode.y;
                    const tx = targetNode.x;
                    const ty = targetNode.y;
                    const sr = getNodeRadius(sourceNode.id);
                    const tr = getNodeRadius(targetNode.id);

                    const dx = tx - sx;
                    const dy = ty - sy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1) return;

                    const ux = dx / dist;
                    const uy = dy / dist;
                    const startX = sx + ux * sr;
                    const startY = sy + uy * sr;
                    const endX = tx - ux * tr;
                    const endY = ty - uy * tr;

                    const isSelected = (selectedNodeId === edge.source || selectedNodeId === edge
                        .target) && connectMode === false;

                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = isSelected ? '#c77d4b' : '#c8b898';
                    ctx.lineWidth = isSelected ? 3 / zoom : 2 / zoom;
                    ctx.lineCap = 'round';
                    ctx.setLineDash([]);
                    ctx.stroke();

                    // 关系标签
                    if (edge.label && edge.label.trim()) {
                        const midX = (startX + endX) / 2;
                        const midY = (startY + endY) / 2;
                        const fontSize = Math.max(10, Math.min(14, 13 / zoom));
                        ctx.font = `600 ${fontSize}px -apple-system, "PingFang SC", sans-serif`;
                        const textMetrics = ctx.measureText(edge.label);
                        const textW = textMetrics.width;
                        const textH = fontSize;
                        const padX = 6 / zoom;
                        const padY = 3 / zoom;

                        // 背景
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.beginPath();
                        const rx = 6 / zoom;
                        const bw = textW + padX * 2;
                        const bh = textH + padY * 2;
                        ctx.roundRect(midX - bw / 2, midY - bh / 2, bw, bh, rx);
                        ctx.fill();

                        // 边框
                        ctx.strokeStyle = 'rgba(180,160,130,0.6)';
                        ctx.lineWidth = 1 / zoom;
                        ctx.stroke();

                        // 文字
                        ctx.fillStyle = '#4a3828';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(edge.label, midX, midY);
                    }

                    // 存储标签屏幕位置用于点击检测
                    edge._labelScreenData = {
                        worldMidX: (startX + endX) / 2,
                        worldMidY: (startY + endY) / 2,
                        worldStartX: startX,
                        worldStartY: startY,
                        worldEndX: endX,
                        worldEndY: endY,
                    };
                });

                // 绘制节点
                nodes.forEach(node => {
                    const r = getNodeRadius(node.id);
                    const isSelected = node.id === selectedNodeId;

                    // 阴影
                    ctx.beginPath();
                    ctx.arc(node.x, node.y + 2 / zoom, r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,0,0,0.08)';
                    ctx.fill();

                    // 主体
                    const gradient = ctx.createRadialGradient(node.x - r * 0.25, node.y - r * 0.3, r * 0.1,
                        node.x, node.y, r);
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.45, node.color || '#e8a87c');
                    gradient.addColorStop(1, '#b88060');
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    // 选中光环
                    if (isSelected) {
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, r + 5 / zoom, 0, Math.PI * 2);
                        ctx.strokeStyle = '#c77d4b';
                        ctx.lineWidth = 3.5 / zoom;
                        ctx.setLineDash([6 / zoom, 3 / zoom]);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }

                    // 连线模式提示
                    if (connectMode && isSelected) {
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, r + 10 / zoom, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(90,160,150,0.7)';
                        ctx.lineWidth = 3 / zoom;
                        ctx.setLineDash([]);
                        const pulse = Math.sin(performance.now() / 400) * 0.3 + 0.7;
                        ctx.globalAlpha = pulse;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }

                    // 边框
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(140,100,60,0.5)';
                    ctx.lineWidth = 1.5 / zoom;
                    ctx.stroke();

                    // 名称
                    const fontSize = Math.max(10, Math.min(15, 14 / zoom));
                    ctx.font = `700 ${fontSize}px -apple-system, "PingFang SC", sans-serif`;
                    ctx.fillStyle = '#2c2416';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const displayName = node.name || '未命名';
                    const maxTextWidth = r * 1.6;
                    let shortName = displayName;
                    if (ctx.measureText(displayName).width > maxTextWidth && displayName.length > 2) {
                        shortName = displayName.substring(0, 2) + '…';
                    }
                    ctx.fillText(shortName, node.x, node.y);

                    // 关系数小标
                    const connCount = getConnectionCount(node.id);
                    if (connCount > 0) {
                        const badgeR = Math.max(9, r * 0.35);
                        const bx = node.x + r * 0.55;
                        const by = node.y - r * 0.55;
                        ctx.beginPath();
                        ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(140,100,60,0.5)';
                        ctx.lineWidth = 1.2 / zoom;
                        ctx.stroke();
                        const badgeFontSize = Math.max(8, badgeR * 0.9);
                        ctx.font = `700 ${badgeFontSize}px -apple-system, sans-serif`;
                        ctx.fillStyle = '#5b3a20';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(connCount, bx, by);
                    }
                });

                ctx.restore();

                // 连线模式指示线
                if (connectMode && selectedNodeId && dragState.type === 'none') {
                    const node = getNodeById(selectedNodeId);
                    if (node) {
                        const screenPos = worldToScreen(node.x, node.y);
                        // 会在touchmove中绘制
                    }
                }
            }

            // ============ 点击检测 ============
            function hitTestNode(worldX, worldY) {
                // 从上到下检查（后画的在上面），这里反过来让先匹配到的在上面
                for (let i = nodes.length - 1; i >= 0; i--) {
                    const node = nodes[i];
                    const r = getNodeRadius(node.id);
                    const dx = worldX - node.x;
                    const dy = worldY - node.y;
                    if (dx * dx + dy * dy <= r * r) {
                        return node;
                    }
                }
                return null;
            }

            function hitTestEdge(worldX, worldY) {
                const threshold = 18 / zoom;
                let bestEdge = null;
                let bestDist = Infinity;
                for (const edge of edges) {
                    const sn = getNodeById(edge.source);
                    const tn = getNodeById(edge.target);
                    if (!sn || !tn) continue;
                    const sr = getNodeRadius(sn.id);
                    const tr = getNodeRadius(tn.id);
                    const dx = tn.x - sn.x;
                    const dy = tn.y - sn.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1) continue;
                    const ux = dx / dist;
                    const uy = dy / dist;
                    const sx = sn.x + ux * sr;
                    const sy = sn.y + uy * sr;
                    const ex = tn.x - ux * tr;
                    const ey = tn.y - uy * tr;

                    // 点到线段距离
                    const px = worldX - sx;
                    const py = worldY - sy;
                    const ldx = ex - sx;
                    const ldy = ey - sy;
                    const lenSq = ldx * ldx + ldy * ldy;
                    let t = Math.max(0, Math.min(1, (px * ldx + py * ldy) / lenSq));
                    const closestX = sx + t * ldx;
                    const closestY = sy + t * ldy;
                    const cdx = worldX - closestX;
                    const cdy = worldY - closestY;
                    const cdist = Math.sqrt(cdx * cdx + cdy * cdy);

                    if (cdist < threshold && cdist < bestDist) {
                        bestDist = cdist;
                        bestEdge = edge;
                    }
                }
                return bestEdge;
            }

            function hitTestEdgeLabel(worldX, worldY) {
                const threshold = 22 / zoom;
                for (const edge of edges) {
                    if (!edge.label || !edge.label.trim()) continue;
                    const d = edge._labelScreenData;
                    if (!d) continue;
                    const dx = worldX - d.worldMidX;
                    const dy = worldY - d.worldMidY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < threshold) return edge;
                }
                return null;
            }

            // ============ 拖拽状态 ============
            const dragState = {
                type: 'none', // 'none' | 'node' | 'pan' | 'connect-drag' | 'pinch'
                nodeId: null,
                startWorldX: 0,
                startWorldY: 0,
                startPanX: 0,
                startPanY: 0,
                startNodeX: 0,
                startNodeY: 0,
                touchStartTime: 0,
                touchStartScreenX: 0,
                touchStartScreenY: 0,
                hasMoved: false,
                pinchStartDist: 0,
                pinchStartZoom: 1,
                pinchStartPanX: 0,
                pinchStartPanY: 0,
                pinchMidX: 0,
                pinchMidY: 0,
                connectLineEndX: 0,
                connectLineEndY: 0,
            };

            function resetDragState() {
                dragState.type = 'none';
                dragState.nodeId = null;
                dragState.hasMoved = false;
            }

            // ============ 触摸/鼠标事件处理 ============
            function getEventPos(e) {
                const rect = canvas.getBoundingClientRect();
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                }
                if (e.changedTouches && e.changedTouches.length > 0) {
                    return { x: e.changedTouches[0].clientX - rect.left, y: e.changedTouches[0].clientY - rect
                            .top };
                }
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            }

            function getMultiTouchPos(e) {
                const rect = canvas.getBoundingClientRect();
                const touches = [];
                for (let i = 0; i < e.touches.length; i++) {
                    touches.push({
                        x: e.touches[i].clientX - rect.left,
                        y: e.touches[i].clientY - rect.top,
                    });
                }
                return touches;
            }

            function handleTouchStart(e) {
                if (e.target !== canvas && !canvas.contains(e.target)) return;
                e.preventDefault();

                const touches = getMultiTouchPos(e);

                if (e.touches.length === 2) {
                    // 双指缩放
                    const dx = touches[1].x - touches[0].x;
                    const dy = touches[1].y - touches[0].y;
                    dragState.type = 'pinch';
                    dragState.pinchStartDist = Math.sqrt(dx * dx + dy * dy);
                    dragState.pinchStartZoom = zoom;
                    dragState.pinchStartPanX = panX;
                    dragState.pinchStartPanY = panY;
                    dragState.pinchMidX = (touches[0].x + touches[1].x) / 2;
                    dragState.pinchMidY = (touches[0].y + touches[1].y) / 2;
                    dragState.hasMoved = false;
                    selectedNodeId = null;
                    connectMode = false;
                    updateConnectModeButton();
                    closeEditPanel();
                    render();
                    return;
                }

                const pos = getEventPos(e);
                const worldPos = screenToWorld(pos.x, pos.y);
                dragState.touchStartTime = Date.now();
                dragState.touchStartScreenX = pos.x;
                dragState.touchStartScreenY = pos.y;
                dragState.hasMoved = false;

                const hitNode = hitTestNode(worldPos.x, worldPos.y);
                const hitEdge = hitTestEdgeLabel(worldPos.x, worldPos.y) || hitTestEdge(worldPos.x, worldPos.y);

                if (hitNode && connectMode) {
                    // 连线模式：点击目标节点
                    if (selectedNodeId && selectedNodeId !== hitNode.id) {
                        // 创建关系
                        saveHistory();
                        const existingEdge = edges.find(e =>
                            (e.source === selectedNodeId && e.target === hitNode.id) ||
                            (e.source === hitNode.id && e.target === selectedNodeId)
                        );
                        if (existingEdge) {
                            showToast('这两个人物已有关系，点击关系线可编辑');
                            selectedNodeId = hitNode.id;
                            render();
                        } else {
                            openEdgeEditPanel(selectedNodeId, hitNode.id);
                        }
                        connectMode = false;
                        updateConnectModeButton();
                    } else {
                        selectedNodeId = hitNode.id;
                        render();
                    }
                    dragState.type = 'none';
                    return;
                }

                if (hitNode && !connectMode) {
                    // 点击或拖拽节点
                    dragState.type = 'node';
                    dragState.nodeId = hitNode.id;
                    dragState.startWorldX = worldPos.x;
                    dragState.startWorldY = worldPos.y;
                    dragState.startNodeX = hitNode.x;
                    dragState.startNodeY = hitNode.y;
                    dragState.startPanX = panX;
                    dragState.startPanY = panY;
                    selectedNodeId = hitNode.id;
                    render();
                    return;
                }

                if (hitEdge && !connectMode) {
                    // 点击关系线标签
                    openEdgeEditPanel(hitEdge.source, hitEdge.target, hitEdge);
                    dragState.type = 'none';
                    selectedNodeId = null;
                    render();
                    return;
                }

                // 点击空白区域
                dragState.type = 'pan';
                dragState.startPanX = panX;
                dragState.startPanY = panY;
                dragState.startWorldX = worldPos.x;
                dragState.startWorldY = worldPos.y;
                selectedNodeId = null;
                connectMode = false;
                updateConnectModeButton();
                closeEditPanel();
                render();
            }

            function handleTouchMove(e) {
                if (e.target !== canvas && !canvas.contains(e.target)) return;
                e.preventDefault();

                if (dragState.type === 'pinch' && e.touches.length === 2) {
                    const touches = getMultiTouchPos(e);
                    const dx = touches[1].x - touches[0].x;
                    const dy = touches[1].y - touches[0].y;
                    const newDist = Math.sqrt(dx * dx + dy * dy);
                    const scale = newDist / dragState.pinchStartDist;
                    const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, dragState.pinchStartZoom * scale));
                    const midX = (touches[0].x + touches[1].x) / 2;
                    const midY = (touches[0].y + touches[1].y) / 2;
                    panX = midX - (dragState.pinchMidX - dragState.pinchStartPanX) * (newZoom / dragState
                        .pinchStartZoom);
                    panY = midY - (dragState.pinchMidY - dragState.pinchStartPanY) * (newZoom / dragState
                        .pinchStartZoom);
                    zoom = newZoom;
                    dragState.hasMoved = true;
                    render();
                    return;
                }

                if (dragState.type === 'none') return;
                const pos = getEventPos(e);
                const dx = pos.x - dragState.touchStartScreenX;
                const dy = pos.y - dragState.touchStartScreenY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 3 && !dragState.hasMoved) {
                    dragState.hasMoved = true;
                }

                if (dragState.type === 'node' && dragState.hasMoved) {
                    const worldPos = screenToWorld(pos.x, pos.y);
                    const node = getNodeById(dragState.nodeId);
                    if (node) {
                        const worldDx = worldPos.x - dragState.startWorldX;
                        const worldDy = worldPos.y - dragState.startWorldY;
                        node.x = dragState.startNodeX + worldDx;
                        node.y = dragState.startNodeY + worldDy;
                        render();
                    }
                } else if (dragState.type === 'pan' && dragState.hasMoved) {
                    panX = dragState.startPanX + dx;
                    panY = dragState.startPanY + dy;
                    render();
                }
            }

            function handleTouchEnd(e) {
                if (dragState.type === 'pinch') {
                    resetDragState();
                    updateUrlHash();
                    saveToLocalStorage();
                    render();
                    return;
                }

                const elapsed = Date.now() - dragState.touchStartTime;
                const hasMoved = dragState.hasMoved;

                if (dragState.type === 'node' && !hasMoved && elapsed < 400) {
                    // 短点击节点
                    const node = getNodeById(dragState.nodeId);
                    if (node) {
                        if (selectedNodeId === node.id && !connectMode) {
                            // 再次点击同一节点 -> 编辑
                            if (elapsed < 250) {
                                // 快速双击
                                openNodeEditPanel(node);
                            } else {
                                // 单击已选中的节点 -> 取消选择
                                selectedNodeId = null;
                                render();
                            }
                        } else if (selectedNodeId && selectedNodeId !== node.id && !connectMode) {
                            // 选中A后点击B -> 创建关系
                            saveHistory();
                            const existingEdge = edges.find(e =>
                                (e.source === selectedNodeId && e.target === node.id) ||
                                (e.source === node.id && e.target === selectedNodeId)
                            );
                            if (existingEdge) {
                                showToast('这两个人物已有关系，点击关系线可编辑');
                                selectedNodeId = node.id;
                                render();
                            } else {
                                openEdgeEditPanel(selectedNodeId, node.id);
                            }
                        } else {
                            selectedNodeId = node.id;
                            render();
                        }
                    }
                } else if (dragState.type === 'node' && hasMoved) {
                    // 拖拽结束
                    saveHistory();
                    updateUrlHash();
                    saveToLocalStorage();
                } else if (dragState.type === 'pan' && hasMoved) {
                    updateUrlHash();
                    saveToLocalStorage();
                } else if (dragState.type === 'pan' && !hasMoved && elapsed < 350) {
                    // 点击空白
                    selectedNodeId = null;
                    connectMode = false;
                    updateConnectModeButton();
                    closeEditPanel();
                    render();
                }

                resetDragState();
                if (dragState.type === 'none' && !hasMoved) {
                    updateBadge();
                    render();
                }
            }

            function handleDoubleTap(e) {
                if (e.target !== canvas && !canvas.contains(e.target)) return;
                e.preventDefault();
                const pos = getEventPos(e);
                const worldPos = screenToWorld(pos.x, pos.y);
                const hitNode = hitTestNode(worldPos.x, worldPos.y);
                if (hitNode) {
                    openNodeEditPanel(hitNode);
                } else {
                    // 双击空白创建节点
                    saveHistory();
                    const newNode = {
                        id: generateNodeId(),
                        name: '',
                        x: worldPos.x,
                        y: worldPos.y,
                        color: getNodeColor(nodes.length),
                    };
                    nodes.push(newNode);
                    selectedNodeId = newNode.id;
                    updateBadge();
                    render();
                    updateUrlHash();
                    saveToLocalStorage();
                    openNodeEditPanel(newNode);
                }
                resetDragState();
            }

            // 长按检测
            let longPressTimer = null;
            let longPressTriggered = false;

            function handleTouchStartWithLongPress(e) {
                handleTouchStart(e);
                longPressTriggered = false;
                if (dragState.type === 'node') {
                    const nodeId = dragState.nodeId;
                    longPressTimer = setTimeout(() => {
                        if (!dragState.hasMoved && dragState.type === 'node' && dragState.nodeId ===
                            nodeId) {
                            longPressTriggered = true;
                            const node = getNodeById(nodeId);
                            if (node) {
                                showNodeContextMenu(node);
                            }
                            resetDragState();
                        }
                    }, 550);
                }
            }

            function handleTouchMoveWithLongPress(e) {
                if (longPressTimer && dragState.hasMoved) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
                handleTouchMove(e);
            }

            function handleTouchEndWithLongPress(e) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
                if (!longPressTriggered) {
                    handleTouchEnd(e);
                }
                longPressTriggered = false;
            }

            function showNodeContextMenu(node) {
                const actions = [
                    { label: '✏️ 编辑名称', action: () => openNodeEditPanel(node) },
                    { label: '🔗 从此节点连线', action: () => { selectedNodeId = node.id;
                            connectMode = true;
                            updateConnectModeButton();
                            render();
                            showToast('请点击另一个节点完成连线'); } },
                    { label: '🗑 删除此节点', action: () => deleteNode(node.id) },
                ];
                // 简单起见，直接弹出编辑面板并扩展操作
                openNodeEditPanel(node);
            }

            // ============ 编辑面板 ============
            let editPanelMode = 'none'; // 'none' | 'node' | 'edge'
            let editPanelNodeId = null;
            let editPanelEdgeData = null; // { source, target, edgeId }

            function openNodeEditPanel(node) {
                editPanelMode = 'node';
                editPanelNodeId = node.id;
                editPanelEdgeData = null;
                panelLabel.textContent = '编辑人物名称';
                panelInput.value = node.name || '';
                panelInput.placeholder = '输入人物名称…';
                panelDelete.style.display = 'flex';
                panelDelete.textContent = '🗑 删除此人物';
                panelActions.style.display = 'flex';
                openPanel();
                setTimeout(() => panelInput.focus(), 350);
            }

            function openEdgeEditPanel(sourceId, targetId, existingEdge = null) {
                editPanelMode = 'edge';
                editPanelNodeId = null;
                editPanelEdgeData = { source: sourceId, target: targetId, edgeId: existingEdge ? existingEdge.id :
                        null };
                panelLabel.textContent = existingEdge ? '编辑关系名称' : '新建关系';
                panelInput.value = existingEdge ? existingEdge.label || '' : '';
                panelInput.placeholder = '输入关系名称（如：朋友、父子…）';
                panelDelete.style.display = existingEdge ? 'flex' : 'none';
                panelDelete.textContent = '🗑 删除此关系';
                panelActions.style.display = 'flex';
                openPanel();
                setTimeout(() => panelInput.focus(), 350);
            }

            function openPanel() {
                editPanel.classList.add('open');
                overlay.classList.add('show');
            }

            function closeEditPanel() {
                editPanel.classList.remove('open');
                overlay.classList.remove('show');
                editPanelMode = 'none';
                editPanelNodeId = null;
                editPanelEdgeData = null;
                panelInput.value = '';
            }

            function confirmEditPanel() {
                const value = panelInput.value.trim();
                if (editPanelMode === 'node' && editPanelNodeId) {
                    const node = getNodeById(editPanelNodeId);
                    if (node) {
                        saveHistory();
                        node.name = value || '未命名';
                        updateBadge();
                        render();
                        updateUrlHash();
                        saveToLocalStorage();
                    }
                } else if (editPanelMode === 'edge' && editPanelEdgeData) {
                    const { source, target, edgeId } = editPanelEdgeData;
                    if (edgeId) {
                        const edge = getEdgeById(edgeId);
                        if (edge) {
                            saveHistory();
                            edge.label = value;
                            updateBadge();
                            render();
                            updateUrlHash();
                            saveToLocalStorage();
                        }
                    } else {
                        saveHistory();
                        const newEdge = {
                            id: generateEdgeId(),
                            source,
                            target,
                            label: value || '关系',
                        };
                        edges.push(newEdge);
                        selectedNodeId = null;
                        updateBadge();
                        render();
                        updateUrlHash();
                        saveToLocalStorage();
                        showToast('关系已创建 ✓');
                    }
                }
                closeEditPanel();
                updateBadge();
                render();
            }

            function deleteFromEditPanel() {
                if (editPanelMode === 'node' && editPanelNodeId) {
                    deleteNode(editPanelNodeId);
                } else if (editPanelMode === 'edge' && editPanelEdgeData && editPanelEdgeData.edgeId) {
                    deleteEdge(editPanelEdgeData.edgeId);
                }
                closeEditPanel();
            }

            function deleteNode(nodeId) {
                const node = getNodeById(nodeId);
                if (!node) return;
                saveHistory();
                edges = edges.filter(e => e.source !== nodeId && e.target !== nodeId);
                nodes = nodes.filter(n => n.id !== nodeId);
                if (selectedNodeId === nodeId) selectedNodeId = null;
                connectMode = false;
                updateConnectModeButton();
                updateBadge();
                render();
                updateUrlHash();
                saveToLocalStorage();
                showToast('人物已删除');
            }

            function deleteEdge(edgeId) {
                saveHistory();
                edges = edges.filter(e => e.id !== edgeId);
                updateBadge();
                render();
                updateUrlHash();
                saveToLocalStorage();
                showToast('关系已删除');
            }

            // ============ Toast ============
            let toastTimer;

            function showToast(msg) {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 1800);
            }

            // ============ 分享 ============
            function generateShareUrl() {
                const data = { nodes, edges, nodeIdCounter, edgeIdCounter };
                const json = JSON.stringify(data);
                let hash;
                if (typeof LZString !== 'undefined' && LZString.compressToEncodedURIComponent) {
                    hash = LZString.compressToEncodedURIComponent(json);
                } else {
                    hash = btoa(unescape(encodeURIComponent(json)));
                }
                const url = window.location.origin + window.location.pathname + '#data=' + hash;
                return url;
            }

            function updateUrlHash() {
                try {
                    const url = generateShareUrl();
                    history.replaceState(null, '', url);
                } catch (e) {
                    // 数据太大，静默处理
                }
            }

            function loadFromUrlHash() {
                const hash = window.location.hash;
                if (!hash || !hash.startsWith('#data=')) return false;
                try {
                    const encoded = hash.substring(6);
                    let json;
                    if (typeof LZString !== 'undefined' && LZString.decompressFromEncodedURIComponent) {
                        json = LZString.decompressFromEncodedURIComponent(encoded);
                    } else {
                        json = decodeURIComponent(escape(atob(encoded)));
                    }
                    if (!json) return false;
                    const data = JSON.parse(json);
                    if (data.nodes && data.edges) {
                        nodes = data.nodes;
                        edges = data.edges;
                        nodeIdCounter = data.nodeIdCounter || nodes.length;
                        edgeIdCounter = data.edgeIdCounter || edges.length;
                        selectedNodeId = null;
                        connectMode = false;
                        updateConnectModeButton();
                        updateBadge();
                        fitAllNodes(false);
                        return true;
                    }
                } catch (e) {
                    console.warn('无法解析分享链接:', e);
                }
                return false;
            }

            function saveToLocalStorage() {
                try {
                    const data = { nodes, edges, nodeIdCounter, edgeIdCounter };
                    localStorage.setItem('relation-map-data', JSON.stringify(data));
                } catch (e) {}
            }

            function loadFromLocalStorage() {
                try {
                    const raw = localStorage.getItem('relation-map-data');
                    if (!raw) return false;
                    const data = JSON.parse(raw);
                    if (data.nodes && data.edges) {
                        nodes = data.nodes;
                        edges = data.edges;
                        nodeIdCounter = data.nodeIdCounter || nodes.length;
                        edgeIdCounter = data.edgeIdCounter || edges.length;
                        selectedNodeId = null;
                        connectMode = false;
                        updateConnectModeButton();
                        updateBadge();
                        fitAllNodes(false);
                        return true;
                    }
                } catch (e) {}
                return false;
            }

            async function shareLink() {
                const url = generateShareUrl();
                updateUrlHash();
                try {
                    if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
                        await navigator.share({
                            title: '人物关系网',
                            text: '查看我创建的人物关系网',
                            url: url,
                        });
                        showToast('已分享 ✓');
                    } else {
                        await navigator.clipboard.writeText(url);
                        showToast('链接已复制到剪贴板 📋');
                    }
                } catch (e) {
                    try {
                        await navigator.clipboard.writeText(url);
                        showToast('链接已复制到剪贴板 📋');
                    } catch (e2) {
                        // 降级：显示链接
                        prompt('复制此链接分享：', url);
                        showToast('请手动复制链接');
                    }
                }
            }

            // ============ 工具栏操作 ============
            function updateConnectModeButton() {
                if (connectMode) {
                    btnConnectMode.classList.add('active');
                    btnConnectMode.textContent = '🔗✓';
                } else {
                    btnConnectMode.classList.remove('active');
                    btnConnectMode.textContent = '🔗';
                }
            }

            function updateBadge() {
                const nodeCount = nodes.length;
                const edgeCount = edges.length;
                nodeCountBadge.textContent = nodeCount + '人 / ' + edgeCount + '关系';
            }

            function addNodeAtCenter() {
                saveHistory();
                const centerWorld = screenToWorld(canvas.width / 2, canvas.height / 2);
                const offsetX = (Math.random() - 0.5) * 80;
                const offsetY = (Math.random() - 0.5) * 80;
                const newNode = {
                    id: generateNodeId(),
                    name: '',
                    x: centerWorld.x + offsetX,
                    y: centerWorld.y + offsetY,
                    color: getNodeColor(nodes.length),
                };
                nodes.push(newNode);
                selectedNodeId = newNode.id;
                connectMode = false;
                updateConnectModeButton();
                updateBadge();
                render();
                updateUrlHash();
                saveToLocalStorage();
                openNodeEditPanel(newNode);
            }

            function toggleConnectMode() {
                if (connectMode) {
                    connectMode = false;
                    selectedNodeId = null;
                    showToast('已退出连线模式');
                } else {
                    if (!selectedNodeId && nodes.length > 0) {
                        showToast('请先点击一个人物节点');
                        return;
                    }
                    if (!selectedNodeId && nodes.length === 0) {
                        showToast('请先添加人物');
                        return;
                    }
                    connectMode = true;
                    showToast('连线模式：请点击另一个节点');
                }
                updateConnectModeButton();
                render();
            }

            function clearAll() {
                if (nodes.length === 0 && edges.length === 0) return;
                if (confirm('确定要清空所有人物和关系吗？此操作可以撤销。')) {
                    saveHistory();
                    nodes = [];
                    edges = [];
                    selectedNodeId = null;
                    connectMode = false;
                    updateConnectModeButton();
                    updateBadge();
                    render();
                    updateUrlHash();
                    saveToLocalStorage();
                    showToast('画布已清空');
                }
            }

            // ============ 事件绑定 ============
            canvas.addEventListener('touchstart', handleTouchStartWithLongPress, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMoveWithLongPress, { passive: false });
            canvas.addEventListener('touchend', handleTouchEndWithLongPress, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEndWithLongPress, { passive: false });
            canvas.addEventListener('dblclick', handleDoubleTap);

            // 鼠标支持（用于桌面调试）
            canvas.addEventListener('mousedown', (e) => {
                const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }],
                    changedTouches: [{ clientX: e.clientX, clientY: e.clientY }], target: e
                    .target, preventDefault: () => {} };
                handleTouchStartWithLongPress(fakeTouch);
            });
            canvas.addEventListener('mousemove', (e) => {
                if (dragState.type === 'none') return;
                const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }],
                    changedTouches: [{ clientX: e.clientX, clientY: e.clientY }], target: e
                    .target, preventDefault: () => {} };
                if (dragState.type === 'pinch') return;
                handleTouchMoveWithLongPress(fakeTouch);
            });
            canvas.addEventListener('mouseup', (e) => {
                const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }],
                    target: e.target, preventDefault: () => {} };
                handleTouchEndWithLongPress(fakeTouch);
            });
            canvas.addEventListener('dblclick', handleDoubleTap);

            // 面板按钮
            panelConfirm.addEventListener('click', confirmEditPanel);
            panelCancel.addEventListener('click', closeEditPanel);
            panelDelete.addEventListener('click', deleteFromEditPanel);
            overlay.addEventListener('click', closeEditPanel);

            // 工具栏按钮
            btnAddNode.addEventListener('click', addNodeAtCenter);
            btnConnectMode.addEventListener('click', toggleConnectMode);
            btnUndo.addEventListener('click', undo);
            btnFit.addEventListener('click', () => fitAllNodes(true));
            btnClear.addEventListener('click', clearAll);
            btnShare.addEventListener('click', shareLink);

            // 窗口大小变化
            window.addEventListener('resize', () => {
                resizeCanvas();
                render();
            });

            // 键盘快捷键
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    e.preventDefault();
                    undo();
                }
                if (e.key === 'Escape') {
                    closeEditPanel();
                    selectedNodeId = null;
                    connectMode = false;
                    updateConnectModeButton();
                    render();
                }
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (selectedNodeId && !connectMode) {
                        e.preventDefault();
                        deleteNode(selectedNodeId);
                    }
                }
            });

            // ============ 初始化 ============
            function init() {
                resizeCanvas();
                let loaded = loadFromUrlHash();
                if (!loaded) {
                    loaded = loadFromLocalStorage();
                }
                if (!loaded || nodes.length === 0) {
                    // 创建示例数据
                    const sampleNodes = [
                        { id: 'n1', name: '张三', x: 0, y: -60, color: '#e8a87c' },
                        { id: 'n2', name: '李四', x: -100, y: 50, color: '#7ec8c8' },
                        { id: 'n3', name: '王五', x: 100, y: 50, color: '#d4a574' },
                        { id: 'n4', name: '赵六', x: -60, y: 150, color: '#f0c8a0' },
                        { id: 'n5', name: '孙七', x: 60, y: 150, color: '#6db8b0' },
                    ];
                    const sampleEdges = [
                        { id: 'e1', source: 'n1', target: 'n2', label: '朋友' },
                        { id: 'e2', source: 'n1', target: 'n3', label: '同事' },
                        { id: 'e3', source: 'n2', target: 'n4', label: '父子' },
                        { id: 'e4', source: 'n3', target: 'n5', label: '夫妻' },
                        { id: 'e5', source: 'n4', target: 'n5', label: '同学' },
                    ];
                    nodes = sampleNodes;
                    edges = sampleEdges;
                    nodeIdCounter = 5;
                    edgeIdCounter = 5;
                    selectedNodeId = null;
                    connectMode = false;
                    updateConnectModeButton();
                    updateBadge();
                    updateUrlHash();
                    saveToLocalStorage();
                }
                fitAllNodes(false);
                updateBadge();
                updateConnectModeButton();
                render();
                updateUrlHash();
            }

            init();

            // ============ 协作提示 ============
            console.log('🕸️ 人物关系网已就绪');
            console.log('📤 点击"分享"按钮生成链接发送给他人');
            console.log('👥 收到链接的人可以查看和编辑同一个关系网');
            console.log('💾 数据自动保存在链接和本地浏览器中');
            console.log('💡 提示：编辑后重新分享链接以同步最新版本');
            console.log('🖐 触屏操作：拖拽移动 | 双击编辑 | 选中节点后点另一个连线 | 双指缩放');
        })();
    </script>
</body>
</html>
